version: '3.8'
services:
  api:
    build: .
    ports: [ "3000:3000" ]
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=select_secret
      - DB_NAME=select_db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=select_secret
      - POSTGRES_DB=select_db
    ports: [ "5432:5432" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
